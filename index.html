<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mini-arcgis</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="view"></div>
    <div id="sketch-toolbar">
      <button class="sketch-btn" id="sketch-point-btn" title="Draw point">
        <span class="sketch-icon sketch-icon-point"></span>
      </button>
      <button class="sketch-btn" id="sketch-polyline-btn" title="Draw polyline">
        <span class="sketch-icon sketch-icon-polyline"></span>
      </button>
      <button class="sketch-btn" id="sketch-polygon-btn" title="Draw polygon">
        <span class="sketch-icon sketch-icon-polygon"></span>
      </button>
      <div class="sketch-divider"></div>
      <button class="sketch-btn" id="sketch-undo-btn" title="Undo (Ctrl+Z)">
        <svg class="sketch-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 14 4 9l5-5"/>
          <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H8"/>
        </svg>
      </button>
      <button class="sketch-btn" id="sketch-redo-btn" title="Redo (Ctrl+Y)">
        <svg class="sketch-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 14 5-5-5-5"/>
          <path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H16"/>
        </svg>
      </button>
      <div class="sketch-divider"></div>
      <button class="sketch-btn sketch-reset-btn" id="sketch-reset-btn" title="Clear all sketches">
        <span class="sketch-icon sketch-icon-reset"></span>
      </button>
    </div>
    <div id="layer-panel">
      <h3>Layers</h3>
      <div class="layer-item">
        <input type="checkbox" id="openstreetmap-layer" checked />
        <label for="openstreetmap-layer">OpenStreetMap Layer</label>
      </div>
      <div class="layer-item">
        <input type="checkbox" id="tile-layer" />
        <label for="tile-layer">Tile Layer(arcgis)</label>
      </div>
      <div class="layer-item">
        <input type="checkbox" id="tianditu-layer" />
        <label for="tianditu-layer">TianDiTu Layer</label>
      </div>
      <div class="layer-item">
        <input type="checkbox" id="graphics-layer" />
        <label for="graphics-layer">Graphics Layer</label>
      </div>
      <div class="layer-item">
        <input type="checkbox" id="mapimage-layer" />
        <label for="mapimage-layer">MapImage Layer</label>
      </div>
      <div class="layer-item">
        <input type="checkbox" id="feature-layer" />
        <label for="feature-layer">Feature Layer</label>
      </div>
      <div class="layer-item">
        <input type="checkbox" id="feature-source-layer" />
        <label for="feature-source-layer">Feature Layer(source)</label>
      </div>
      <div class="layer-item">
        <input type="checkbox" id="geojson-layer" />
        <label for="geojson-layer">GeoJSON Layer</label>
      </div>
    </div>
    <div id="code-panel">
      <div class="code-panel-header">
        <button class="code-nav-btn" id="code-prev-btn">◀</button>
        <span class="code-panel-title" id="code-panel-title"
          >OpenStreetMap Layer</span
        >
        <button class="code-nav-btn" id="code-next-btn">▶</button>
      </div>
      <pre class="code-content"><code id="code-display"></code></pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
